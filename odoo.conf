[options]
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; Workers — tune based on CPU cores: (cores * 2) + 1
workers = 9
max_cron_threads = 2

; Limits
limit_memory_hard = 2684354560   ; 2.5 GB
limit_memory_soft = 2147483648   ; 2 GB
limit_request = 8192
limit_time_cpu = 1200
limit_time_real = 2400

; Longpolling (live chat / bus)
longpolling_port = 8072

; Logging
log_level = warn
logfile = /var/lib/odoo/odoo.log

; Security — set a strong random key
admin_passwd = CHANGE_ME_USE_A_STRONG_SECRET
